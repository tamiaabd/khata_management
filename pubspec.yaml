name: khata_management
description: "this project is created for shuab bhai for his gass business"
publish_to: 'none'

version: 1.5.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  printing: ^5.14.2
  pdf: ^3.11.3
  intl: ^0.20.2
  provider: ^6.1.2
  google_fonts: ^6.2.1
  http: ^1.5.0
  open_filex: ^4.7.0
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  in_app_update: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.23.1
  build_runner: ^2.4.15
  msix: ^3.16.9

flutter:
  uses-material-design: true
  fonts:
    - family: BombayBlackUnicode
      fonts:
        - asset: assets/fonts/bombay_black_unicode.ttf
    - family: JameelNooriNastaleeq
      fonts:
        - asset: assets/fonts/jameel Noori_nastaleeq_regular.ttf
    - family: JameelNooriNastaleeqKasheeda
      fonts:
        - asset: assets/fonts/jameel Noori_nastaleeq_kasheeda.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
        - asset: assets/fonts/poppins/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/poppins/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/poppins/Poppins-BoldItalic.ttf
          weight: 700
          style: italic

msix_config:
  display_name: Virtual Manager
  publisher_display_name: Saari Technologies
  # Must exactly match the Subject of the code-signing .pfx (GitHub WIN_CERT_PFX).
  publisher: CN=KhataManagement
  identity_name: com.saaritech.khata.management
  msix_version: 1.5.0.1
  execution_alias: khata_management
  # Do not add runFullTrust here — msix already injects it for desktop; duplicating it breaks MakeAppx (0x80080204).
  capabilities: internetClient
  install_certificate: false
