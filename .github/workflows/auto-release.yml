name: Auto Build And Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_windows_msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Resolve build version
        shell: bash
        run: |
          BASE_VERSION=$(awk '/^version:/{split($2,a,"+"); print a[1]}' pubspec.yaml)
          echo "BASE_VERSION=$BASE_VERSION" >> "$GITHUB_ENV"

      - name: Build windows app
        shell: bash
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release --build-name "$BASE_VERSION" --build-number "${{ github.run_number }}"

      - name: Create MSIX package
        shell: bash
        run: |
          dart run msix:create --install-certificate false

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: build/windows/**/*.msix
          if-no-files-found: error

  build_android_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Resolve build version
        run: |
          BASE_VERSION=$(awk '/^version:/{split($2,a,"+"); print a[1]}' pubspec.yaml)
          echo "BASE_VERSION=$BASE_VERSION" >> "$GITHUB_ENV"

      - name: Build android apk
        run: flutter build apk --release --build-name "$BASE_VERSION" --build-number "${{ github.run_number }}"

      - name: Upload android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  release:
    needs:
      - build_windows_msix
      - build_android_apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        run: |
          BASE_VERSION=$(awk '/^version:/{split($2,a,"+"); print a[1]}' pubspec.yaml)
          echo "BASE_VERSION=$BASE_VERSION" >> "$GITHUB_ENV"
          echo "TAG_NAME=v${BASE_VERSION}+${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msix
          path: dist/windows

      - name: Download android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/android

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Auto Release ${{ env.TAG_NAME }}
          generate_release_notes: true
          files: |
            dist/windows/**/*.msix
            dist/android/**/*.apk
